<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilhete de Passagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 16px;
            color: #ffffff;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            background: #111;
            padding: 16px 24px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #2a2a2a;
        }

        .header .logo {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
        }

        .header .logo span {
            color: #888;
        }

        .header .badge {
            color: #666;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Courier New', monospace;
        }

        .header .badge .dot {
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #111;
            padding: 12px 16px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .stat-card .label {
            font-size: 10px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-card .sub {
            font-size: 10px;
            color: #444;
        }

        /* ===== FORM ===== */
        .form-section {
            background: #111;
            padding: 18px 22px;
            border-radius: 4px;
            border: 1px solid #222;
            margin-bottom: 16px;
        }

        .form-section h2 {
            font-size: 14px;
            font-weight: 800;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            font-family: 'Courier New', monospace;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 10px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            font-family: 'Courier New', monospace;
        }

        .form-group label .required {
            color: #cc0000;
        }

        .form-group input {
            padding: 8px 12px;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #666;
            background: #111;
        }

        .form-group input[readonly] {
            background: #1a1a1a;
            color: #555;
        }

        .form-group input::placeholder {
            color: #333;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #1a1a1a;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            flex: 1;
            min-width: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            border: 1px solid #333;
        }

        .btn-primary:hover {
            background: #ddd;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #2a2a2a;
        }

        .btn-secondary:hover {
            background: #222;
            color: #fff;
        }

        /* ===== TABLE ===== */
        .table-section {
            background: #111;
            padding: 16px 18px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .table-header h3 {
            font-size: 13px;
            font-weight: 800;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Courier New', monospace;
        }

        .search-box {
            padding: 6px 12px;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            min-width: 150px;
            background: #0a0a0a;
            color: #fff;
        }

        .search-box:focus {
            outline: none;
            border-color: #555;
        }

        .search-box::placeholder {
            color: #333;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        thead th {
            background: #0a0a0a;
            padding: 8px 10px;
            text-align: left;
            font-weight: 700;
            color: #666;
            border-bottom: 2px solid #1a1a1a;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        tbody td {
            padding: 8px 10px;
            border-bottom: 1px solid #1a1a1a;
            vertical-align: middle;
            color: #ccc;
            font-size: 12px;
        }

        tbody tr:hover {
            background: #0a0a0a;
        }

        .action-btn {
            padding: 4px 8px;
            border: 1px solid #2a2a2a;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            margin: 2px;
            background: #0a0a0a;
            color: #888;
            font-family: 'Courier New', monospace;
        }

        .action-btn:hover {
            background: #222;
            color: #fff;
            border-color: #555;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #444;
            font-family: 'Courier New', monospace;
        }

        .empty-state .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .empty-state .title {
            font-size: 14px;
            font-weight: 700;
            color: #666;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0,0,0,0.9);
            padding: 16px;
        }

        .modal-content {
            margin: 10px auto;
            padding: 0;
            max-width: 850px;
            width: 100%;
            max-height: calc(100vh - 20px);
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ================================================================ */
        /* ===== BILHETE PRETO E BRANCO - VERSÃO COMPLETA ===== */
        /* ================================================================ */
        .bilhete {
            background: #ffffff;
            font-family: 'Courier New', 'JetBrains Mono', monospace;
            border: 2px solid #000000;
            border-radius: 6px;
            padding: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            color: #000000;
            position: relative;
        }

        .bilhete::before {
            content: 'AUTENTICADO';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 80px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            letter-spacing: 15px;
            pointer-events: none;
            z-index: 0;
        }

        .bilhete > * {
            position: relative;
            z-index: 1;
        }

        /* CABEÇALHO */
        .bilhete-header {
            background: #000000;
            padding: 18px 24px;
            text-align: center;
            border-bottom: 2px solid #000;
        }

        .bilhete-header .via {
            font-size: 12px;
            font-weight: 700;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .bilhete-header .title {
            font-size: 20px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }

        .bilhete-header .title span {
            color: #888;
        }

        .bilhete-header .subtitle {
            font-size: 11px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .bilhete-header .codigo {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 4px 18px;
            border-radius: 4px;
            color: #888;
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
        }

        .bilhete-header .codigo i {
            color: #666;
        }

        /* CORPO */
        .bilhete-body {
            padding: 18px 24px 14px;
            background: #ffffff;
        }

        /* LINHA DE CORTE */
        .bilhete-corte {
            text-align: center;
            font-size: 10px;
            color: #999;
            letter-spacing: 4px;
            padding: 6px 0;
            border-top: 2px dashed #ccc;
            border-bottom: 2px dashed #ccc;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        .bilhete-corte i {
            color: #aaa;
        }

        /* EMPRESA */
        .bilhete-empresa {
            font-size: 11px;
            color: #000000;
            padding: 6px 0;
            border-bottom: 1px dashed #ccc;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .bilhete-empresa .empresa-nome {
            font-weight: 900;
            font-size: 12px;
        }

        .bilhete-empresa .empresa-dados {
            font-size: 9px;
            color: #555;
        }

        /* GRID */
        .bilhete-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 20px;
            font-size: 11px;
            padding: 6px 0;
        }

        .bilhete-grid .item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px dashed #ddd;
        }

        .bilhete-grid .item .label {
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            font-size: 8px;
            letter-spacing: 0.5px;
        }

        .bilhete-grid .item .value {
            font-weight: 700;
            color: #000000;
            text-align: right;
            font-size: 11px;
        }

        .bilhete-grid .item .value.destaque {
            font-size: 14px;
            color: #000;
        }

        .bilhete-grid-full {
            grid-column: 1 / -1;
        }

        /* PASSAGEIRO */
        .bilhete-passageiro {
            margin: 6px 0;
            padding: 6px 0;
            border-top: 1px dashed #ccc;
            border-bottom: 1px dashed #ccc;
        }

        .bilhete-passageiro .row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 11px;
        }

        .bilhete-passageiro .row .label {
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            font-size: 8px;
            letter-spacing: 0.5px;
        }

        .bilhete-passageiro .row .value {
            font-weight: 700;
            color: #000000;
            font-size: 12px;
        }

        .bilhete-passageiro .row .value.destaque {
            font-size: 13px;
            color: #000;
        }

        /* VALORES */
        .bilhete-valores {
            margin: 8px 0;
            padding: 8px 0;
            border-top: 1px dashed #ccc;
            border-bottom: 1px dashed #ccc;
        }

        .bilhete-valores .valor-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 11px;
        }

        .bilhete-valores .valor-row .label {
            color: #666;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bilhete-valores .valor-row .value {
            font-weight: 700;
            color: #000000;
            font-size: 11px;
        }

        .bilhete-valores .valor-total {
            font-weight: 900;
            font-size: 14px;
            padding-top: 4px;
            border-top: 1px solid #aaa;
            margin-top: 3px;
        }

        .bilhete-valores .valor-total .value {
            font-size: 15px;
            color: #000;
        }

        /* BP-e */
        .bilhete-bpe {
            font-size: 10px;
            color: #555;
            padding: 6px 0;
            border-bottom: 1px dashed #ccc;
            line-height: 1.8;
        }

        .bilhete-bpe strong {
            color: #000000;
        }

        .bilhete-bpe .chave {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.5px;
            word-break: break-all;
            color: #000000;
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 3px;
            display: inline-block;
            margin-top: 3px;
        }

        /* QR CODE */
        .bilhete-qr {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
            border-bottom: 1px dashed #ccc;
            margin: 6px 0;
        }

        .bilhete-qr .qr-box {
            width: 65px;
            height: 65px;
            background: #000000;
            border: 2px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bilhete-qr .qr-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 4px, #333 4px, #333 5px),
                repeating-linear-gradient(90deg, transparent, transparent 4px, #333 4px, #333 5px);
            opacity: 0.3;
        }

        .bilhete-qr .qr-box .qr-dot {
            width: 7px;
            height: 7px;
            background: #ffffff;
            border-radius: 1px;
            position: absolute;
        }

        .bilhete-qr .qr-text {
            font-size: 9px;
            color: #555;
            font-family: 'Courier New', monospace;
            text-align: center;
            line-height: 1.4;
        }

        .bilhete-qr .qr-text strong {
            color: #000000;
            font-size: 11px;
        }

        /* TRIBUTOS */
        .bilhete-tributos {
            font-size: 9px;
            color: #555;
            padding: 6px 0;
            border-bottom: 1px dashed #ccc;
            margin: 6px 0;
        }

        .bilhete-tributos strong {
            color: #000000;
        }

        /* ===== DIREITOS DO PASSAGEIRO - COMPLETO ===== */
        .bilhete-direitos {
            font-size: 8.5px;
            color: #000000;
            line-height: 1.6;
            padding: 10px 0;
            margin-top: 8px;
            border-top: 2px solid #aaa;
        }

        .bilhete-direitos .direitos-title {
            font-weight: 900;
            color: #000000;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .bilhete-direitos .direitos-sub {
            font-weight: 700;
            color: #000000;
            font-size: 8.5px;
            margin-bottom: 4px;
        }

        .bilhete-direitos .direitos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 16px;
        }

        .bilhete-direitos .direitos-grid span {
            display: flex;
            justify-content: space-between;
            padding: 1px 0;
            font-size: 8px;
            color: #000000;
        }

        .bilhete-direitos .direitos-grid .full {
            grid-column: 1 / -1;
        }

        .bilhete-direitos .direitos-paragrafo {
            font-size: 7.5px;
            color: #555;
            padding: 3px 0 3px 12px;
            line-height: 1.5;
            border-left: 2px solid #ccc;
            margin: 3px 0;
        }

        .bilhete-direitos .direitos-deveres {
            font-weight: 700;
            color: #000000;
            font-size: 9px;
            margin-top: 8px;
            margin-bottom: 3px;
        }

        .bilhete-direitos .obs {
            font-size: 7px;
            color: #777;
            margin-top: 6px;
            font-style: italic;
            border-top: 1px dashed #ddd;
            padding-top: 4px;
        }

        /* NUMERAÇÃO */
        .bilhete-pagina {
            text-align: right;
            font-size: 8px;
            color: #999;
            padding: 3px 0 0;
            border-top: 1px solid #ddd;
            margin-top: 6px;
            font-family: 'Courier New', monospace;
        }

        /* FOOTER */
        .bilhete-footer {
            background: #f0f0f0;
            padding: 10px 24px 12px;
            border-top: 2px solid #ccc;
            font-size: 9px;
            color: #555;
            text-align: center;
            line-height: 1.6;
        }

        .bilhete-footer .footer-via {
            font-weight: 700;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 10px;
        }

        .bilhete-footer .footer-info {
            font-size: 8px;
            color: #777;
        }

        .bilhete-footer .footer-info strong {
            color: #000000;
        }

        /* ACTIONS */
        .bilhete-actions {
            display: flex;
            gap: 8px;
            padding: 10px 24px 14px;
            border-top: 1px solid #ccc;
            background: #f0f0f0;
            flex-wrap: wrap;
        }

        .bilhete-actions .btn {
            flex: 1;
            min-width: 80px;
            padding: 8px 16px;
            font-size: 11px;
            border-radius: 4px;
        }

        .btn-close-bilhete {
            background: #ccc;
            color: #000000;
            border: 1px solid #aaa;
        }

        .btn-close-bilhete:hover {
            background: #bbb;
        }

        .btn-print-bilhete {
            background: #000000;
            color: #ffffff;
            border: 1px solid #000;
        }

        .btn-print-bilhete:hover {
            background: #333;
        }

        .btn-edit-bilhete {
            background: #ccc;
            color: #000000;
            border: 1px solid #aaa;
        }

        .btn-edit-bilhete:hover {
            background: #bbb;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 320px;
            width: 100%;
        }

        .toast {
            padding: 10px 16px;
            border-radius: 4px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            animation: slideIn 0.4s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Courier New', monospace;
            border: 1px solid #333;
        }

        .toast i { font-size: 15px; }
        .toast-success { background: #1a1a1a; color: #4caf50; }
        .toast-error { background: #1a1a1a; color: #ff4444; }
        .toast-info { background: #1a1a1a; color: #66aaff; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .bilhete-grid { grid-template-columns: 1fr; }
            .bilhete-direitos .direitos-grid { grid-template-columns: 1fr; }
            .bilhete-body { padding: 14px 16px; }
            .bilhete-header { padding: 14px 16px; }
            .bilhete-actions { flex-direction: column; }
            .form-grid { grid-template-columns: 1fr; }
            .form-section { padding: 14px 16px; }
            .header { flex-direction: column; text-align: center; padding: 14px 18px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .bilhete-qr { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .bilhete-grid .item { flex-wrap: wrap; gap: 2px; }
            .bilhete-grid .item .value { text-align: left; width: 100%; }
        }

        /* ===== PRINT ===== */
        @media print {
            body { background: white !important; padding: 0 !important; }
            .header, .stats-grid, .form-section, .table-section, .toast-container { display: none !important; }
            .modal { display: block !important; position: relative !important; background: white !important; padding: 0 !important; }
            .modal-content { box-shadow: none !important; border-radius: 0 !important; max-height: none !important; margin: 0 !important; max-width: 100% !important; }
            .bilhete-actions { display: none !important; }
            .bilhete { border: 2px solid #000 !important; border-radius: 0 !important; box-shadow: none !important; }
            .bilhete-header { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: #000000 !important; }
            .bilhete-body { background: #ffffff !important; }
            .bilhete-footer { background: #f0f0f0 !important; }
            .bilhete-actions { background: #f0f0f0 !important; }
            .bilhete::before { display: none !important; }
            .bilhete-qr .qr-box { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Toast -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Modal -->
        <div id="modalTicket" class="modal" onclick="if(event.target===this) fecharModal()">
            <div class="modal-content" id="ticketContent"></div>
        </div>

        <!-- HEADER -->
        <header class="header">
            <div>
                <div class="logo">Buser<span>.</span></div>
                <div style="font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase;">Sistema de Passagens</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <span class="badge"><span class="dot"></span> <span id="relogio">--:--:--</span></span>
                <span class="badge"><i class="fas fa-ticket-alt"></i> <span id="totalOnline">0</span></span>
            </div>
        </header>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total</div>
                <div class="number" id="totalPassagens">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Hoje</div>
                <div class="number" id="viagensHoje">0</div>
                <div class="sub" id="ultimaEmissao">Última: -</div>
            </div>
            <div class="stat-card">
                <div class="label">Próximo</div>
                <div class="number" id="proximoId">1</div>
            </div>
            <div class="stat-card">
                <div class="label">Destino</div>
                <div class="number" id="destinoFreq" style="font-size:16px;">-</div>
            </div>
        </div>

        <!-- FORM -->
        <section class="form-section" id="formSection">
            <h2><i class="fas fa-plus-circle"></i> Emitir Passagem</h2>
            <form id="formPassagem" onsubmit="return false;">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome <span class="required">*</span></label>
                        <input type="text" id="nome" placeholder="JOSINEIDE PERES DE GUSMAO" required>
                    </div>
                    <div class="form-group">
                        <label>CPF <span class="required">*</span></label>
                        <input type="text" id="cpf" placeholder="05380275419" required>
                    </div>
                    <div class="form-group">
                        <label>Nascimento</label>
                        <input type="date" id="dataNascimento">
                    </div>
                </div>
                <div class="form-grid" style="margin-top:10px;">
                    <div class="form-group">
                        <label>Data Viagem <span class="required">*</span></label>
                        <input type="date" id="dataViagem" required>
                    </div>
                    <div class="form-group">
                        <label>Viação <span class="required">*</span></label>
                        <input type="text" id="viacao" value="PROGRESSO" required>
                    </div>
                    <div class="form-group">
                        <label>Classe</label>
                        <input type="text" id="classe" value="EXECUTIVO">
                    </div>
                </div>
                <div class="form-grid" style="margin-top:10px;">
                    <div class="form-group">
                        <label>Origem <span class="required">*</span></label>
                        <input type="text" id="origem" placeholder="PARNAMIRIM, RN" required>
                    </div>
                    <div class="form-group">
                        <label>Destino <span class="required">*</span></label>
                        <input type="text" id="destino" placeholder="CAMPINA GRANDE, PB" required>
                    </div>
                </div>
                <div class="form-grid" style="margin-top:10px;">
                    <div class="form-group">
                        <label>Embarque <span class="required">*</span></label>
                        <input type="datetime-local" id="embarque" required>
                    </div>
                    <div class="form-group">
                        <label>Partida</label>
                        <input type="datetime-local" id="partida">
                    </div>
                    <div class="form-group">
                        <label>Poltrona <span class="required">*</span></label>
                        <input type="text" id="poltrona" placeholder="35" required>
                    </div>
                </div>
                <div class="form-grid" style="margin-top:10px;">
                    <div class="form-group">
                        <label>Plataforma</label>
                        <input type="text" id="plataforma" value="0">
                    </div>
                    <div class="form-group">
                        <label>Linha</label>
                        <input type="text" id="linha" placeholder="CARUARU(PE) - NATAL(RN)">
                    </div>
                    <div class="form-group">
                        <label>Prefixo</label>
                        <input type="text" id="prefixo" placeholder="PERN0003035">
                    </div>
                </div>
                <div class="form-grid" style="margin-top:10px;">
                    <div class="form-group">
                        <label>Valor R$</label>
                        <input type="text" id="valor" value="82,00">
                    </div>
                    <div class="form-group">
                        <label>Pagamento</label>
                        <input type="text" id="formaPagamento" value="DINHEIRO">
                    </div>
                    <div class="form-group">
                        <label>Bilhete</label>
                        <input type="text" id="bilheteNum" placeholder="087654">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary" id="btnEmitir" onclick="criarPassagem()">
                        <i class="fas fa-check"></i> Emitir
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">
                        <i class="fas fa-undo"></i> Limpar
                    </button>
                </div>
            </form>
        </section>

        <!-- TABLE -->
        <section class="table-section">
            <div class="table-header">
                <h3><i class="fas fa-list"></i> Passagens</h3>
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                    <input type="text" class="search-box" id="searchBox" placeholder="Buscar..." onkeyup="filtrarTabela()">
                    <span style="font-size:10px;color:#444;" id="totalItens">0</span>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Passageiro</th>
                            <th>Origem → Destino</th>
                            <th>Data</th>
                            <th>Poltrona</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPassagens">
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <span class="icon">🎫</span>
                                    <div class="title">Nenhuma passagem</div>
                                    <div style="font-size:11px;color:#333;">Preencha o formulário e clique em "Emitir"</div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // ============================================================
        // BANCO DE DADOS
        // ============================================================
        let passagens = [];
        let idCounter = 1;
        let editandoId = null;

        // ============================================================
        // RELÓGIO
        // ============================================================
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR');
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        // ============================================================
        // DATA ATUAL
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const hoje = new Date();
            const hojeStr = hoje.toISOString().split('T')[0];
            document.getElementById('dataViagem').value = hojeStr;
            document.getElementById('dataNascimento').value = '1980-01-01';

            const dataHora = new Date(hoje);
            dataHora.setHours(13, 0, 0);
            const dataHoraStr = dataHora.toISOString().slice(0, 16);
            document.getElementById('embarque').value = dataHoraStr;
            document.getElementById('partida').value = dataHoraStr;

            renderizarTabela();
            atualizarStats();
        });

        // ============================================================
        // TOAST
        // ============================================================
        function mostrarToast(mensagem, tipo = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            toast.className = `toast toast-${tipo}`;
            toast.innerHTML = `<i class="fas ${icons[tipo] || icons.info}"></i> ${mensagem}`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // GERAR CÓDIGO
        // ============================================================
        function gerarCodigo() {
            const agora = new Date();
            const data = agora.getFullYear().toString().slice(2) +
                String(agora.getMonth() + 1).padStart(2, '0') +
                String(agora.getDate()).padStart(2, '0');
            return 'B' + data + String(idCounter).padStart(4, '0');
        }

        // ============================================================
        // GERAR CHAVE
        // ============================================================
        function gerarChaveAcesso() {
            let chave = '';
            for (let i = 0; i < 44; i++) {
                chave += Math.floor(Math.random() * 10);
            }
            return chave;
        }

        // ============================================================
        // ATUALIZAR STATS
        // ============================================================
        function atualizarStats() {
            document.getElementById('totalPassagens').textContent = passagens.length;
            document.getElementById('proximoId').textContent = passagens.length + 1;
            document.getElementById('totalOnline').textContent = passagens.length;

            const hojeStr = new Date().toLocaleDateString('pt-BR');
            const hojeCount = passagens.filter(p => {
                const dataEmissao = p.data_emissao ? p.data_emissao.split(' ')[0] : '';
                return dataEmissao === hojeStr;
            }).length;
            document.getElementById('viagensHoje').textContent = hojeCount;

            if (passagens.length > 0) {
                const ultima = passagens[passagens.length - 1];
                document.getElementById('ultimaEmissao').textContent = `Última: ${ultima.data_emissao || '-'}`;

                const destinos = {};
                passagens.forEach(p => { destinos[p.destino] = (destinos[p.destino] || 0) + 1; });
                const maisFreq = Object.entries(destinos).sort((a, b) => b[1] - a[1])[0];
                document.getElementById('destinoFreq').textContent = maisFreq ? maisFreq[0] : '-';
            } else {
                document.getElementById('ultimaEmissao').textContent = 'Última: -';
                document.getElementById('destinoFreq').textContent = '-';
            }

            document.getElementById('totalItens').textContent = passagens.length + ' itens';
        }

        // ============================================================
        // CRIAR PASSAGEM
        // ============================================================
        function criarPassagem() {
            const dados = {
                nome: document.getElementById('nome').value.trim().toUpperCase(),
                cpf: document.getElementById('cpf').value.trim(),
                data_nascimento: document.getElementById('dataNascimento').value,
                origem: document.getElementById('origem').value.trim().toUpperCase(),
                destino: document.getElementById('destino').value.trim().toUpperCase(),
                viacao: document.getElementById('viacao').value.trim().toUpperCase(),
                classe: document.getElementById('classe').value.trim().toUpperCase() || 'EXECUTIVO',
                embarque: document.getElementById('embarque').value,
                partida: document.getElementById('partida').value || document.getElementById('embarque').value,
                poltrona: document.getElementById('poltrona').value.trim(),
                plataforma: document.getElementById('plataforma').value.trim() || '0',
                linha: document.getElementById('linha').value.trim().toUpperCase() || `${document.getElementById('origem').value.trim().toUpperCase()} - ${document.getElementById('destino').value.trim().toUpperCase()}`,
                prefixo: document.getElementById('prefixo').value.trim().toUpperCase() || 'PERN0003035',
                valor: document.getElementById('valor').value.trim() || '82,00',
                formaPagamento: document.getElementById('formaPagamento').value.trim().toUpperCase() || 'DINHEIRO',
                bilheteNum: document.getElementById('bilheteNum').value.trim() || String(Math.floor(Math.random() * 900000) + 100000)
            };

            const obrigatorios = ['nome', 'cpf', 'origem', 'destino', 'viacao', 'embarque', 'poltrona'];
            const faltando = obrigatorios.filter(campo => !dados[campo]);

            if (faltando.length > 0) {
                const nomes = {
                    nome: 'Nome',
                    cpf: 'CPF',
                    origem: 'Origem',
                    destino: 'Destino',
                    viacao: 'Viação',
                    embarque: 'Embarque',
                    poltrona: 'Poltrona'
                };
                const msg = faltando.map(c => nomes[c] || c).join(', ');
                mostrarToast('❌ Preencha: ' + msg, 'error');
                return;
            }

            const dataEmbarque = new Date(dados.embarque);
            const dataPartida = new Date(dados.partida);

            const passagem = {
                id: idCounter,
                codigo: gerarCodigo(),
                nome: dados.nome,
                cpf: dados.cpf,
                data_nascimento: dados.data_nascimento,
                origem: dados.origem,
                destino: dados.destino,
                viacao: dados.viacao,
                classe: dados.classe,
                embarque: dataEmbarque.toLocaleString('pt-BR'),
                partida: dataPartida.toLocaleString('pt-BR'),
                poltrona: dados.poltrona,
                plataforma: dados.plataforma,
                linha: dados.linha,
                prefixo: dados.prefixo,
                valor: dados.valor,
                formaPagamento: dados.formaPagamento,
                bilheteNum: dados.bilheteNum,
                tipo_viagem: 'ORDINÁRIO',
                tipo_desconto: 'NORMAL',
                status: 'CONFIRMADA',
                data_emissao: new Date().toLocaleString('pt-BR'),
                chave_acesso: gerarChaveAcesso(),
                protocolo: String(Math.floor(Math.random() * 90000000000000) + 10000000000000),
                localizador: String.fromCharCode(65 + Math.floor(Math.random() * 26)) +
                    String.fromCharCode(65 + Math.floor(Math.random() * 26)) +
                    String.fromCharCode(65 + Math.floor(Math.random() * 26)) +
                    String(Math.floor(Math.random() * 9) + 1) +
                    String.fromCharCode(65 + Math.floor(Math.random() * 26)) +
                    String.fromCharCode(65 + Math.floor(Math.random() * 26))
            };

            passagens.push(passagem);
            idCounter++;

            limparFormulario();
            renderizarTabela();
            atualizarStats();
            mostrarToast(`✅ Passagem ${passagem.codigo} emitida!`, 'success');

            setTimeout(() => visualizarPassagem(passagem.id), 500);
        }

        // ============================================================
        // RENDERIZAR TABELA
        // ============================================================
        function renderizarTabela() {
            const tbody = document.getElementById('tabelaPassagens');

            if (passagens.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <span class="icon">🎫</span>
                                <div class="title">Nenhuma passagem</div>
                                <div style="font-size:11px;color:#333;">Preencha o formulário e clique em "Emitir"</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = passagens.map(p => `
                <tr data-search="${p.nome} ${p.cpf} ${p.destino} ${p.origem} ${p.codigo}">
                    <td><strong style="font-family:monospace;font-size:12px;color:#fff;">${p.codigo}</strong></td>
                    <td><strong style="color:#fff;font-size:12px;">${p.nome}</strong></td>
                    <td style="color:#999;font-size:12px;">${p.origem} → ${p.destino}</td>
                    <td style="color:#999;font-size:12px;">${p.embarque ? p.embarque.split(' ')[0] : '-'}</td>
                    <td><strong style="color:#fff;font-size:13px;">${p.poltrona}</strong></td>
                    <td>
                        <button class="action-btn" onclick="visualizarPassagem(${p.id})" title="Visualizar"><i class="fas fa-eye"></i></button>
                        <button class="action-btn" onclick="editarPassagem(${p.id})" title="Editar"><i class="fas fa-pen"></i></button>
                        <button class="action-btn" onclick="imprimirPassagem(${p.id})" title="Imprimir"><i class="fas fa-print"></i></button>
                        <button class="action-btn" onclick="deletarPassagem(${p.id})" title="Excluir"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // ============================================================
        // VISUALIZAR PASSAGEM - COM TODOS OS DIREITOS
        // ============================================================
        function visualizarPassagem(id) {
            const p = passagens.find(p => p.id === id);
            if (!p) {
                mostrarToast('❌ Passagem não encontrada', 'error');
                return;
            }

            const modal = document.getElementById('ticketContent');

            const qrDots = [
                'top:6px;left:6px;', 'top:6px;left:18px;', 'top:6px;left:30px;', 'top:6px;left:42px;',
                'top:18px;left:6px;', 'top:18px;left:30px;', 'top:18px;left:42px;',
                'top:30px;left:6px;', 'top:30px;left:18px;', 'top:30px;left:30px;', 'top:30px;left:42px;',
                'top:42px;left:6px;', 'top:42px;left:18px;', 'top:42px;left:42px;',
                'top:18px;left:18px;width:5px;height:5px;',
                'top:6px;left:54px;', 'top:18px;left:54px;', 'top:30px;left:54px;', 'top:42px;left:54px;',
                'top:54px;left:6px;', 'top:54px;left:18px;', 'top:54px;left:30px;', 'top:54px;left:42px;', 'top:54px;left:54px;'
            ];

            const qrHtml = qrDots.map(d => `<div class="qr-dot" style="${d}"></div>`).join('');

            modal.innerHTML = `
                <div class="bilhete" id="bilhetePrint">
                    <!-- HEADER -->
                    <div class="bilhete-header">
                        <div class="via"><i class="fas fa-ticket-alt"></i> VIA DO PASSAGEIRO</div>
                        <div class="title">Buser<span>.</span></div>
                        <div class="subtitle">DOCUMENTO AUXILIAR DE BILHETE DE PASSAGEM ELETRÔNICO</div>
                        <div class="codigo"><i class="fas fa-qrcode"></i> ${p.codigo}</div>
                    </div>

                    <!-- BODY -->
                    <div class="bilhete-body">

                        <div class="bilhete-corte">
                            <i class="fas fa-cut"></i> ✂️ CORTE AQUI ✂️ <i class="fas fa-cut"></i>
                        </div>

                        <!-- EMPRESA -->
                        <div class="bilhete-empresa">
                            <div class="empresa-nome">BUS SERVICOS DE AGENDAMENTO S.A.</div>
                            <div class="empresa-dados">CNPJ: 17289475000142 &nbsp;|&nbsp; SAC: 08007669000</div>
                            <div class="empresa-dados">AV DR CARDOSO DE MELO, 1608, VILA OLIMPIA - SAO PAULO - SP, SP</div>
                        </div>

                        <!-- GRID -->
                        <div class="bilhete-grid">
                            <div class="item"><span class="label">Viação</span><span class="value">${p.viacao}</span></div>
                            <div class="item"><span class="label">Classe</span><span class="value">${p.classe}</span></div>
                            <div class="item"><span class="label">Origem</span><span class="value">${p.origem}</span></div>
                            <div class="item"><span class="label">Destino</span><span class="value">${p.destino}</span></div>
                            <div class="item"><span class="label">Embarque</span><span class="value">${p.embarque}</span></div>
                            <div class="item"><span class="label">Partida</span><span class="value">${p.partida}</span></div>
                            <div class="item"><span class="label">Poltrona</span><span class="value destaque"><strong>${p.poltrona}</strong></span></div>
                            <div class="item"><span class="label">Plataforma</span><span class="value">${p.plataforma}</span></div>
                            <div class="item bilhete-grid-full"><span class="label">Linha</span><span class="value">${p.linha}</span></div>
                            <div class="item"><span class="label">Tipo de viagem</span><span class="value">${p.tipo_viagem}</span></div>
                            <div class="item"><span class="label">Prefixo</span><span class="value">${p.prefixo}</span></div>
                            <div class="item"><span class="label">Localizador</span><span class="value">${p.localizador}</span></div>
                        </div>

                        <!-- PASSAGEIRO -->
                        <div class="bilhete-passageiro">
                            <div class="row"><span class="label">Passageiro</span><span class="value destaque">${p.nome}</span></div>
                            <div class="row"><span class="label">CPF</span><span class="value">${p.cpf}</span></div>
                            <div class="row"><span class="label">Tipo de desconto</span><span class="value">${p.tipo_desconto}</span></div>
                        </div>

                        <!-- VALORES -->
                        <div class="bilhete-valores">
                            <div class="valor-row"><span class="label">Tarifa</span><span class="value">${p.valor}</span></div>
                            <div class="valor-row"><span class="label">Pedágio</span><span class="value">0,00</span></div>
                            <div class="valor-row"><span class="label">Taxa de embarque</span><span class="value">0,00</span></div>
                            <div class="valor-row"><span class="label">Seguro obrigatório</span><span class="value">0,00</span></div>
                            <div class="valor-row"><span class="label">Outros</span><span class="value">0,00</span></div>
                            <div class="valor-row valor-total"><span class="label">Valor Total R$</span><span class="value"><strong>${p.valor}</strong></span></div>
                            <div class="valor-row"><span class="label">Desconto</span><span class="value">0,00</span></div>
                            <div class="valor-row"><span class="label">Valor a pagar R$</span><span class="value">0,00</span></div>
                            <div class="valor-row"><span class="label">Forma de pagamento</span><span class="value">${p.formaPagamento}</span></div>
                            <div class="valor-row"><span class="label">Valor pago R$</span><span class="value">${p.valor}</span></div>
                            <div class="valor-row"><span class="label">Troco</span><span class="value">0,00</span></div>
                        </div>

                        <!-- BP-e -->
                        <div class="bilhete-bpe">
                            <div><strong>BP-e nº:</strong> ${p.bilheteNum} &nbsp;|&nbsp; <strong>Série:</strong> 3 &nbsp;|&nbsp; <strong>Bilhete:</strong> ${p.bilheteNum}</div>
                            <div><strong>Protocolo de autorização:</strong> ${p.protocolo}</div>
                            <div><strong>Data de autorização:</strong> ${p.data_emissao}</div>
                            <div style="margin-top:4px;">
                                <strong>Chave de acesso:</strong>
                                <br>
                                <span class="chave">${p.chave_acesso}</span>
                            </div>
                        </div>

                        <!-- QR CODE -->
                        <div class="bilhete-qr">
                            <div class="qr-box">${qrHtml}</div>
                            <div class="qr-text">

        // ============================================================
        // FECHAR MODAL
        // ============================================================
        function fecharModal() {
            document.getElementById('modalTicket').style.display = 'none';
        }

        // ============================================================
        // DELETAR PASSAGEM
        // ============================================================
        function deletarPassagem(id) {
            if (!confirm('⚠️ Cancelar esta passagem?')) return;
            passagens = passagens.filter(p => p.id !== id);
            renderizarTabela();
            atualizarStats();
            mostrarToast('🗑️ Passagem cancelada', 'info');
        }

        // ============================================================
        // EDITAR PASSAGEM
        // ============================================================
        function editarPassagem(id) {
            const p = passagens.find(p => p.id === id);
            if (!p) {
                mostrarToast('❌ Passagem não encontrada', 'error');
                return;
            }

            editandoId = id;

            document.getElementById('nome').value = p.nome;
            document.getElementById('cpf').value = p.cpf;
            document.getElementById('origem').value = p.origem;
            document.getElementById('destino').value = p.destino;
            document.getElementById('viacao').value = p.viacao;
            document.getElementById('classe').value = p.classe;
            document.getElementById('poltrona').value = p.poltrona;
            document.getElementById('plataforma').value = p.plataforma;
            document.getElementById('linha').value = p.linha;
            document.getElementById('prefixo').value = p.prefixo;
            document.getElementById('valor').value = p.valor;
            document.getElementById('formaPagamento').value = p.formaPagamento;
            document.getElementById('bilheteNum').value = p.bilheteNum;

            if (p.data_nascimento) {
                document.getElementById('dataNascimento').value = p.data_nascimento;
            }

            if (p.embarque) {
                try {
                    const partes = p.embarque.split(' ');
                    if (partes.length >= 2) {
                        const dataPartes = partes[0].split('/');
                        const horaPartes = partes[2] ? partes[2].replace('h', '').split(':') : ['13', '00'];
                        if (dataPartes.length === 3) {
                            const data = new Date(dataPartes[2], dataPartes[1] - 1, dataPartes[0]);
                            data.setHours(parseInt(horaPartes[0]) || 13, parseInt(horaPartes[1]) || 0);
                            document.getElementById('embarque').value = data.toISOString().slice(0, 16);
                        }
                    }
                } catch (e) {}
            }

            document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });

            const btn = document.getElementById('btnEmitir');
            btn.innerHTML = '<i class="fas fa-sync-alt"></i> Atualizar';
            btn.onclick = atualizarPassagem;

            mostrarToast(`✏️ Editando ${p.codigo}`, 'info');
        }

        // ============================================================
        // ATUALIZAR PASSAGEM
        // ============================================================
        function atualizarPassagem() {
            if (!editandoId) return;

            const dados = {
                nome: document.getElementById('nome').value.trim().toUpperCase(),
                cpf: document.getElementById('cpf').value.trim(),
                data_nascimento: document.getElementById('dataNascimento').value,
                origem: document.getElementById('origem').value.trim().toUpperCase(),
                destino: document.getElementById('destino').value.trim().toUpperCase(),
                viacao: document.getElementById('viacao').value.trim().toUpperCase(),
                classe: document.getElementById('classe').value.trim().toUpperCase() || 'EXECUTIVO',
                embarque: document.getElementById('embarque').value,
                partida: document.getElementById('partida').value || document.getElementById('embarque').value,
                poltrona: document.getElementById('poltrona').value.trim(),
                plataforma: document.getElementById('plataforma').value.trim() || '0',
                linha: document.getElementById('linha').value.trim().toUpperCase() || `${document.getElementById('origem').value.trim().toUpperCase()} - ${document.getElementById('destino').value.trim().toUpperCase()}`,
                prefixo: document.getElementById('prefixo').value.trim().toUpperCase() || 'PERN0003035',
                valor: document.getElementById('valor').value.trim() || '82,00',
                formaPagamento: document.getElementById('formaPagamento').value.trim().toUpperCase() || 'DINHEIRO',
                bilheteNum: document.getElementById('bilheteNum').value.trim() || String(Math.floor(Math.random() * 900000) + 100000)
            };

            const obrigatorios = ['nome', 'cpf', 'origem', 'destino', 'viacao', 'embarque', 'poltrona'];
            const faltando = obrigatorios.filter(campo => !dados[campo]);

            if (faltando.length > 0) {
                mostrarToast('❌ Preencha todos os campos obrigatórios', 'error');
                return;
            }

            const index = passagens.findIndex(p => p.id === editandoId);
            if (index === -1) {
                mostrarToast('❌ Passagem não encontrada', 'error');
                return;
            }

            const dataEmbarque = new Date(dados.embarque);
            const dataPartida = new Date(dados.partida);

            passagens[index] = {
                ...passagens[index],
                nome: dados.nome,
                cpf: dados.cpf,
                data_nascimento: dados.data_nascimento,
                origem: dados.origem,
                destino: dados.destino,
                viacao: dados.viacao,
                classe: dados.classe,
                embarque: dataEmbarque.toLocaleString('pt-BR'),
                partida: dataPartida.toLocaleString('pt-BR'),
                poltrona: dados.poltrona,
                plataforma: dados.plataforma,
                linha: dados.linha,
                prefixo: dados.prefixo,
                valor: dados.valor,
                formaPagamento: dados.formaPagamento,
                bilheteNum: dados.bilheteNum,
                status: 'ATUALIZADA'
            };

            limparFormulario();
            renderizarTabela();
            atualizarStats();
            mostrarToast(`✅ Passagem atualizada!`, 'success');

            const btn = document.getElementById('btnEmitir');
            btn.innerHTML = '<i class="fas fa-check"></i> Emitir';
            btn.onclick = criarPassagem;
            editandoId = null;

            setTimeout(() => visualizarPassagem(passagens[index].id), 400);
        }

        // ============================================================
        // LIMPAR FORMULÁRIO
        // ============================================================
        function limparFormulario() {
            document.querySelectorAll('#formPassagem input').forEach(input => {
                if (input.id !== 'dataViagem' && input.id !== 'dataNascimento') {
                    input.value = '';
                }
            });

            const hoje = new Date();
            const hojeStr = hoje.toISOString().split('T')[0];
            document.getElementById('dataViagem').value = hojeStr;

            const dataHora = new Date(hoje);
            dataHora.setHours(13, 0, 0);
            const dataHoraStr = dataHora.toISOString().slice(0, 16);
            document.getElementById('embarque').value = dataHoraStr;
            document.getElementById('partida').value = dataHoraStr;

            document.getElementById('viacao').value = 'PROGRESSO';
            document.getElementById('classe').value = 'EXECUTIVO';
            document.getElementById('plataforma').value = '0';
            document.getElementById('formaPagamento').value = 'DINHEIRO';

            const btn = document.getElementById('btnEmitir');
            btn.innerHTML = '<i class="fas fa-check"></i> Emitir';
            btn.onclick = criarPassagem;
            editandoId = null;
        }

        // ============================================================
        // FILTRAR
        // ============================================================
        function filtrarTabela() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.querySelectorAll('#tabelaPassagens tr');

            rows.forEach(row => {
                if (row.querySelector('.empty-state')) return;
                const data = row.getAttribute('data-search') || '';
                row.style.display = data.toLowerCase().includes(search) ? '' : 'none';
            });
        }

        // ============================================================
        // INICIAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            renderizarTabela();
            atualizarStats();
        });

        setInterval(atualizarStats, 30000);
    </script>
</body>
